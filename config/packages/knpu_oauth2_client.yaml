knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(default:oauth_google_client_id_fallback:OAUTH_GOOGLE_CLIENT_ID)%'
            client_secret: '%env(default:oauth_google_client_secret_fallback:OAUTH_GOOGLE_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params: []
            use_state: true
            use_oidc_mode: true