knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(string:OAUTH_GOOGLE_CLIENT_ID:)%'
            client_secret: '%env(string:OAUTH_GOOGLE_CLIENT_SECRET:)%'
            redirect_route: connect_google_check
            redirect_params: {}
            # Allow missing environment variables for API-only deployment
            use_state: true