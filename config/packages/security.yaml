security:
    role_hierarchy:
        ROLE_ADMIN: [ROLE_STAFF, ROLE_USER]
        ROLE_STAFF: ROLE_USER
    
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        api_login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: App\Security\JWTAuthenticationSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api_register: 
            pattern: ^/api/register
            stateless: true
            security: false
        
        api: 
            pattern: ^/api
            stateless: true
            jwt: ~

        main:
            pattern: ^/
            lazy: false
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: email
                password_parameter: password
                default_target_path: app_dashboard_home
            custom_authenticators:
                - App\Security\GoogleAuthenticator  # For web OAuth
                # Not: App\Security\SecurityAuthenticator (that's for email login)
            logout:
                path: app_logout
                target: app_landing

    access_control:

        # ========== API ROUTES ========== #
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/resend-verification, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/google, roles: PUBLIC_ACCESS }
        - { path: ^/api/products, roles: PUBLIC_ACCESS }
        - { path: ^/api/categories, roles: PUBLIC_ACCESS }
        - { path: ^/api/orders/count, roles: PUBLIC_ACCESS }
        - { path: ^/api/fcm/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/me, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        # ========== PUBLIC ROUTES (no login required) ========== #
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/resend-verification, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google$, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google/check, roles: PUBLIC_ACCESS }
        - { path: ^/contact, roles: PUBLIC_ACCESS }
        - { path: ^/about, roles: PUBLIC_ACCESS }

        # ========== ADMIN-ONLY ROUTES ========== #
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_ADMIN }
        - { path: ^/activity-log, roles: ROLE_ADMIN }
        
        # ========== STAFF & ADMIN ROUTES ========== #
        - { path: ^/category, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/customer, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/order, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/product, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/stock, roles: [ROLE_ADMIN, ROLE_STAFF] }

        # ========== ALL LOGGED IN USERS ========== #
        - { path: ^/dashboard, roles: [ROLE_USER, ROLE_STAFF, ROLE_ADMIN] }
        - { path: ^/profile, roles: [ROLE_USER, ROLE_STAFF, ROLE_ADMIN] }
        
        # ========== FALLBACK - Require authentication for everything else ========== #
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10